name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "wrangler.toml"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
