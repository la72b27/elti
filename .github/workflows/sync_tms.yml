name: Sync TMS Data to ELTI

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install httpx playwright
          playwright install chromium --with-deps

      - name: Run sync script
        env:
          TMS_BASE_URL: ${{ secrets.TMS_BASE_URL }}
          TMS_USERNAME: ${{ secrets.TMS_USERNAME }}
          TMS_PASSWORD: ${{ secrets.TMS_PASSWORD }}
          ELTI_WORKER_URL: ${{ secrets.ELTI_WORKER_URL }}
          ELTI_UPDATE_TOKEN: ${{ secrets.ELTI_UPDATE_TOKEN }}
        run: python scripts/sync_tms.py
